<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-primary: #00f3ff; 
            --neon-secondary: #ff00ea; 
            --bg-color: #0d0d12;
            --card-bg: #1a1a24;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 100px; 
        }

        header {
            text-align: center;
            padding: 25px 15px;
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.1);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--neon-primary), 0 0 20px var(--neon-primary);
            letter-spacing: 2px;
        }

        .categories {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            scrollbar-width: none;
        }
        
        .categories::-webkit-scrollbar { display: none; }

        .category-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-btn.active {
            border-color: var(--neon-primary);
            color: var(--neon-primary);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4) inset, 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .menu-container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 15px;
            border-left: 3px solid var(--neon-secondary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .item-image {
            width: 80px;
            height: 80px;
            background-color: #2a2a36;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 8px rgba(255, 0, 234, 0.2);
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.2;
            margin-bottom: 8px;
            padding-right: 30px;
        }

        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-primary);
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        /* Botão de Adicionar ao Carrinho */
        .add-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: transparent;
            border: 1px solid var(--neon-secondary);
            color: var(--neon-secondary);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 0, 234, 0.3);
            transition: 0.2s;
        }

        .add-btn:active {
            background-color: var(--neon-secondary);
            color: #fff;
            transform: scale(0.9);
        }

        /* Botão Flutuante do Carrinho */
        .cart-floating-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--card-bg);
            border: 2px solid var(--neon-primary);
            color: #fff;
            padding: 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }

        .cart-floating-btn:active { transform: scale(0.95); }

        .cart-count {
            background-color: var(--neon-secondary);
            color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        /* Modal do Carrinho */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 200;
            justify-content: center;
            align-items: flex-end; /* Modal sobe de baixo */
        }

        .modal.open { display: flex; }

        .modal-content {
            background-color: var(--bg-color);
            width: 100%;
            max-height: 80vh;
            border-top: 2px solid var(--neon-primary);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -5px 20px rgba(0, 243, 255, 0.2);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
        }

        .close-btn {
            background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;
        }

        .cart-items-container {
            overflow-y: auto;
            flex: 1;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cart-item-info { flex: 1; }
        .cart-item-title { font-weight: bold; margin-bottom: 5px; }
        .cart-item-price { color: var(--neon-primary); }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ctrl-btn {
            background-color: #2a2a36;
            border: 1px solid var(--text-color);
            color: #fff;
            width: 25px; height: 25px;
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .total-container {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            text-align: right;
            margin-bottom: 20px;
            color: var(--neon-secondary);
        }

        .checkout-btn {
            background-color: #25D366; /* Verde WhatsApp */
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.4);
        }

    </style>
</head>
<body>

    <header>
        <h1>SYSTEM MENU</h1>
    </header>

    <div class="categories">
        <button class="category-btn active" onclick="filterMenu('todos')">Todos</button>
        <button class="category-btn" onclick="filterMenu('burgers')">Burgers</button>
        <button class="category-btn" onclick="filterMenu('bebidas')">Bebidas</button>
        <button class="category-btn" onclick="filterMenu('combos')">Combos</button>
    </div>

    <div class="menu-container" id="menu-list"></div>

    <div class="cart-floating-btn" onclick="toggleCart()">
        🛒 Sacola <div class="cart-count" id="cart-count-badge">0</div>
    </div>

    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>SUA SACOLA</span>
                <button class="close-btn" onclick="toggleCart()">&times;</button>
            </div>
            <div class="cart-items-container" id="cart-items-list">
                </div>
            <div class="total-container">
                Total: R$ <span id="cart-total-price">0,00</span>
            </div>
            <button class="checkout-btn" onclick="sendToWhatsApp()">ENVIAR PEDIDO 📱</button>
        </div>
    </div>

    <script>
        const menuData = [
            { id: 1, name: "Cyber Burger", desc: "Pão brioche, blend 180g, cheddar, bacon e molho especial.", price: 32.90, category: "burgers", icon: "🍔" },
            { id: 2, name: "Neon Smash", desc: "Pão tradicional, 2x smash 90g, queijo prato e cebola caramelizada.", price: 26.50, category: "burgers", icon: "🍔" },
            { id: 3, name: "Refrigerante Lata", desc: "Coca-Cola, Guaraná, Sprite (350ml).", price: 6.00, category: "bebidas", icon: "🥤" },
            { id: 4, name: "Suco de Laranja", desc: "Natural e sem açúcar (400ml).", price: 9.00, category: "bebidas", icon: "🍹" },
            { id: 5, name: "Combo Matrix", desc: "1 Cyber Burger + Fritas + Refrigerante.", price: 45.00, category: "combos", icon: "🍟" }
        ];

        let cart = [];

        const menuList = document.getElementById('menu-list');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const cartModal = document.getElementById('cart-modal');
        const cartItemsList = document.getElementById('cart-items-list');
        const cartCountBadge = document.getElementById('cart-count-badge');
        const cartTotalPrice = document.getElementById('cart-total-price');

        // Formatar valor para Moeda BR
        function formatMoney(value) {
            return value.toFixed(2).replace('.', ',');
        }

        // Renderizar Lista de Produtos
        function renderItems(items) {
            menuList.innerHTML = '';
            items.forEach(item => {
                const itemHTML = `
                    <div class="menu-item">
                        <div class="item-image">${item.icon}</div>
                        <div class="item-details">
                            <div class="item-title">${item.name}</div>
                            <div class="item-desc">${item.desc}</div>
                            <div class="item-price">R$ ${formatMoney(item.price)}</div>
                        </div>
                        <button class="add-btn" onclick="addToCart(${item.id})">+</button>
                    </div>
                `;
                menuList.innerHTML += itemHTML;
            });
        }

        // Filtro de Categorias
        function filterMenu(category) {
            categoryBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (category === 'todos') {
                renderItems(menuData);
            } else {
                const filtered = menuData.filter(item => item.category === category);
                renderItems(filtered);
            }
        }

        // Lógica do Carrinho
        function addToCart(id) {
            const product = menuData.find(item => item.id === id);
            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.qtd += 1;
            } else {
                cart.push({ ...product, qtd: 1 });
            }
            updateCartUI();
        }

        function changeQtd(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qtd += delta;
                if (item.qtd <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                updateCartUI();
            }
        }

        function updateCartUI() {
            cartItemsList.innerHTML = '';
            let total = 0;
            let count = 0;

            cart.forEach(item => {
                total += item.price * item.qtd;
                count += item.qtd;

                cartItemsList.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-price">R$ ${formatMoney(item.price * item.qtd)}</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="ctrl-btn" onclick="changeQtd(${item.id}, -1)">-</button>
                            <span>${item.qtd}</span>
                            <button class="ctrl-btn" onclick="changeQtd(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });

            cartCountBadge.innerText = count;
            cartTotalPrice.innerText = formatMoney(total);

            // Ocultar botão flutuante se a sacola estiver vazia
            document.querySelector('.cart-floating-btn').style.display = count > 0 ? 'flex' : 'none';
        }

        function toggleCart() {
            cartModal.classList.toggle('open');
        }

        // Fechar modal clicando fora dele
        window.onclick = function(event) {
            if (event.target === cartModal) toggleCart();
        }

        // Enviar para o WhatsApp
        function sendToWhatsApp() {
            if (cart.length === 0) {
                alert("Sua sacola está vazia!");
                return;
            }

            let text = "Olá! Gostaria de fazer o seguinte pedido:%0A%0A"; // %0A é a quebra de linha na URL
            
            let total = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.qtd;
                total += itemTotal;
                text += `▪️ *${item.qtd}x* ${item.name} - R$ ${formatMoney(itemTotal)}%0A`;
            });

            text += `%0A*Total a pagar: R$ ${formatMoney(total)}*`;

            const phone = "5581921426179"; // Número fornecido com DDI 55 do Brasil
            const whatsappUrl = `https://wa.me/${phone}?text=${text}`;
            
            window.open(whatsappUrl, '_blank');
        }

        // Iniciar
        window.onload = () => {
            renderItems(menuData);
            updateCartUI(); // Inicializa ocultando o botão flutuante se estiver vazio
        };
    </script>
</body>
</html>
