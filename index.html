<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-primary: #00f3ff; /* Ciano Neon */
            --neon-secondary: #ff00ea; /* Magenta Neon */
            --bg-color: #0d0d12;
            --card-bg: #1a1a24;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px; /* Espaço para não cortar o último item */
        }

        header {
            text-align: center;
            padding: 25px 15px;
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.1);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--neon-primary), 0 0 20px var(--neon-primary);
            letter-spacing: 2px;
        }

        /* Menu de Categorias */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            scrollbar-width: none; /* Firefox */
        }
        
        .categories::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .category-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
        }

        .category-btn.active {
            border-color: var(--neon-primary);
            color: var(--neon-primary);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4) inset, 0 0 10px rgba(0, 243, 255, 0.4);
        }

        /* Lista de Produtos */
        .menu-container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 15px;
            border-left: 3px solid var(--neon-secondary);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }

        .menu-item:active {
            transform: scale(0.98);
        }

        .item-image {
            width: 80px;
            height: 80px;
            background-color: #2a2a36;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 8px rgba(255, 0, 234, 0.2);
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-primary);
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

    </style>
</head>
<body>

    <header>
        <h1>SYSTEM MENU</h1>
    </header>

    <div class="categories">
        <button class="category-btn active" onclick="filterMenu('todos')">Todos</button>
        <button class="category-btn" onclick="filterMenu('burgers')">Burgers</button>
        <button class="category-btn" onclick="filterMenu('bebidas')">Bebidas</button>
        <button class="category-btn" onclick="filterMenu('combos')">Combos</button>
    </div>

    <div class="menu-container" id="menu-list">
        </div>

    <script>
        // Banco de dados simulado do cardápio
        const menuData = [
            { id: 1, name: "Cyber Burger", desc: "Pão brioche, blend 180g, cheddar, bacon e molho especial.", price: "R$ 32,90", category: "burgers", icon: "🍔" },
            { id: 2, name: "Neon Smash", desc: "Pão tradicional, 2x smash 90g, queijo prato e cebola caramelizada.", price: "R$ 26,50", category: "burgers", icon: "🍔" },
            { id: 3, name: "Refrigerante Lata", desc: "Coca-Cola, Guaraná, Sprite (350ml).", price: "R$ 6,00", category: "bebidas", icon: "🥤" },
            { id: 4, name: "Suco de Laranja", desc: "Natural e sem açúcar (400ml).", price: "R$ 9,00", category: "bebidas", icon: "🍹" },
            { id: 5, name: "Combo Matrix", desc: "1 Cyber Burger + Fritas + Refrigerante.", price: "R$ 45,00", category: "combos", icon: "🍟" }
        ];

        const menuList = document.getElementById('menu-list');
        const categoryBtns = document.querySelectorAll('.category-btn');

        // Função para renderizar os itens na tela
        function renderItems(items) {
            menuList.innerHTML = '';
            items.forEach(item => {
                const itemHTML = `
                    <div class="menu-item">
                        <div class="item-image">${item.icon}</div>
                        <div class="item-details">
                            <div class="item-title">${item.name}</div>
                            <div class="item-desc">${item.desc}</div>
                            <div class="item-price">${item.price}</div>
                        </div>
                    </div>
                `;
                menuList.innerHTML += itemHTML;
            });
        }

        // Função para filtrar por categoria
        function filterMenu(category) {
            // Atualiza botões ativos
            categoryBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Filtra os dados
            if (category === 'todos') {
                renderItems(menuData);
            } else {
                const filtered = menuData.filter(item => item.category === category);
                renderItems(filtered);
            }
        }

        // Renderiza tudo ao carregar a página
        window.onload = () => {
            renderItems(menuData);
        };
    </script>
</body>
</html>
